<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MFMCF Academics – Admin Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="logo">
          <div class="logo-icon">M</div>
          <div>
            <h1>MFMCF Academics</h1>
            <p>Admin Portal</p>
          </div>
        </div>
        <p class="login-subtitle">Sign in to manage academic content</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="admin@example.com" required autocomplete="email">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
            <button type="button" id="togglePassword" class="toggle-password" tabindex="-1">
              <svg id="eyeShow" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
              <svg id="eyeHide" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="display:none">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
              </svg>
            </button>
          </div>
        </div>

        <div id="errorMsg" class="error-msg hidden"></div>

        <button type="submit" id="loginBtn" class="btn btn-primary btn-full">
          <span id="btnText">Sign In to Admin Portal</span>
          <div id="btnLoader" class="btn-loader hidden"></div>
        </button>
      </form>

      <!-- <p style="margin-top:22px;font-size:12px;color:var(--text-light);text-align:center;line-height:1.7">
        Admin access only. Unauthorized access is prohibited.<br>
        <span style="color:var(--text-light)">Need admin access? Set <code style="background:#f0f0f0;padding:1px 5px;border-radius:4px;font-size:11px">role: "admin"</code> on your Firestore user document.</span>
      </p> -->
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';
    import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';

    const app = initializeApp({
      apiKey: 'AIzaSyBK-hI3KNpsecXtDy9nLpgjN235gOoDKXs',
      authDomain: 'academics-91250.firebaseapp.com',
      projectId: 'academics-91250',
      storageBucket: 'academics-91250.firebasestorage.app',
      messagingSenderId: '438823579389',
      appId: '1:438823579389:web:d6dc928706665de9661894',
      measurementId: 'G-N6SKK48CX1'
    });
    const auth = getAuth(app);
    const db   = getFirestore(app);

    async function isAdmin(uid) {
      const snap = await getDoc(doc(db, 'users', uid));
      return snap.exists() && snap.data().role === 'admin';
    }

    // Auto-redirect if already signed in as admin
    onAuthStateChanged(auth, async (user) => {
      if (user && await isAdmin(user.uid)) {
        window.location.replace('dashboard.html');
      }
    });

    // Toggle password visibility
    const pwInput = document.getElementById('password');
    document.getElementById('togglePassword').addEventListener('click', () => {
      const show = pwInput.type === 'password';
      pwInput.type = show ? 'text' : 'password';
      document.getElementById('eyeShow').style.display = show ? 'none' : '';
      document.getElementById('eyeHide').style.display = show ? '' : 'none';
    });

    // Login submit
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errEl    = document.getElementById('errorMsg');
      const btnText  = document.getElementById('btnText');
      const loader   = document.getElementById('btnLoader');
      const btn      = document.getElementById('loginBtn');

      errEl.classList.add('hidden');
      btnText.style.display = 'none';
      loader.classList.remove('hidden');
      btn.disabled = true;

      try {
        const cred = await signInWithEmailAndPassword(auth, email, password);
        if (!await isAdmin(cred.user.uid)) {
          await auth.signOut();
          throw Object.assign(new Error('Access denied. This account does not have admin privileges.'), { code: 'not-admin' });
        }
        window.location.replace('dashboard.html');
      } catch (err) {
        let msg = err.message;
        if (['auth/user-not-found','auth/wrong-password','auth/invalid-credential','auth/invalid-email'].includes(err.code)) msg = 'Invalid email or password.';
        else if (err.code === 'auth/too-many-requests') msg = 'Too many failed attempts. Please try again later.';
        else if (err.code === 'auth/network-request-failed') msg = 'Network error. Check your connection.';
        errEl.textContent = msg;
        errEl.classList.remove('hidden');
        btnText.style.display = '';
        loader.classList.add('hidden');
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
